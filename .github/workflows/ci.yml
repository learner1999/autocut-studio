name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python:
    name: Python backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check formatting
        run: black --check autocut setup.py test/test_app_project.py

      - name: Run focused backend tests
        run: pytest test/test_app_project.py

  swift:
    name: macOS app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Swift tests
        run: swift test --package-path macos/AutoCutStudio
